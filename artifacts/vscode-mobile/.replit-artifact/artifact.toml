kind = "web"
previewPath = "/"
title = "KM Code Editor"
version = "1.0.0"
id = "artifacts/vscode-mobile"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/vscode-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vscode-mobile", "run", "build" ]
publicDir = "artifacts/vscode-mobile/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
